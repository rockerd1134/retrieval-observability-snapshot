experiment_name: replay_validation_kubernetes_website_docs_before_oracle

datasets:
  - name: kubernetes_website_docs
    path: ../../reports/review2026/pilot_kubernetes_website_docs/snapshot_comparison/before/dataset
    query_set_id: kubernetes-website-docs-pilot-queries
    corpus_snapshot_manifest: ../../reports/review2026/pilot_kubernetes_website_docs/snapshot_comparison/before/snapshot_manifests/corpus_snapshot_manifest.json
    graph_snapshot_manifest: ../../reports/review2026/pilot_kubernetes_website_docs/snapshot_comparison/before/snapshot_manifests/graph_snapshot_manifest.json
    support_surface_manifest: ../../reports/review2026/pilot_kubernetes_website_docs/snapshot_comparison/before/snapshot_manifests/support_surface_manifest.json

tests:
  - name: oracle_graph_support
    image: retrieval-arena/oracle-graph-support:latest
    build_context: ../../tests/oracle_graph_support
    config:
      seed_top_k: 5
      target_top_k: 5
      hop_budget: 2
      final_top_k: 8
      max_context_chars_per_doc: 1200
      directed: false
      experiment_id: E005

scoring:
  method: lexical_baseline
  match_threshold: 0.5

output_dir: ../../reports/review2026/replay_validation/actual/kubernetes_website_docs/before_oracle
