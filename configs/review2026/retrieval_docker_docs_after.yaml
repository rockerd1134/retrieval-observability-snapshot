experiment_name: review2026_docker_docs_after

datasets:
  - name: docker_docs
    path: ../../reports/review2026/pilot_docker_docs/snapshot_comparison/after/dataset
    query_set_id: docker-docs-pilot-queries
    corpus_snapshot_manifest: ../../reports/review2026/pilot_docker_docs/snapshot_comparison/after/snapshot_manifests/corpus_snapshot_manifest.json
    graph_snapshot_manifest: ../../reports/review2026/pilot_docker_docs/snapshot_comparison/after/snapshot_manifests/graph_snapshot_manifest.json
    support_surface_manifest: ../../reports/review2026/pilot_docker_docs/snapshot_comparison/after/snapshot_manifests/support_surface_manifest.json

tests:
  - name: rag_lexical_topk
    image: retrieval-arena/rag-lexical-topk:latest
    build_context: ../../tests/rag_lexical_topk
    config:
      top_k: 5
      max_context_chars_per_doc: 1500
      experiment_id: E002b

  - name: rag_vector
    image: retrieval-arena/rag-vector:latest
    build_context: ../../tests/rag_vector
    config:
      top_k: 5
      experiment_id: E002

  - name: rag_graph_rerank
    image: retrieval-arena/rag-graph-rerank:latest
    build_context: ../../tests/rag_graph_rerank
    config:
      seed_top_k: 5
      final_top_k: 5
      max_context_chars_per_doc: 1200
      experiment_id: E004

  - name: oracle_graph_support
    image: retrieval-arena/oracle-graph-support:latest
    build_context: ../../tests/oracle_graph_support
    config:
      seed_top_k: 5
      target_top_k: 5
      hop_budget: 2
      final_top_k: 8
      max_context_chars_per_doc: 1200
      directed: false
      experiment_id: E005

  - name: rag_graph_multihop_rerank
    image: retrieval-arena/rag-graph-multihop-rerank:latest
    build_context: ../../tests/rag_graph_multihop_rerank
    config:
      seed_top_k: 5
      max_hops: 3
      frontier_budget_per_node: 12
      candidate_budget: 60
      final_top_k: 5
      distance_penalty: 0.15
      reserved_deep_slots: 2
      reserved_min_graph_distance: 2
      max_context_chars_per_doc: 1200
      directed: false
      experiment_id: E006

  - name: rag_iterative_search
    image: retrieval-arena/rag-iterative-search:latest
    build_context: ../../tests/rag_iterative_search
    network_disabled: true
    config:
      search_top_k: 5
      inspect_budget: 8
      follow_budget_per_page: 3
      max_actions: 30
      final_top_k: 5
      max_context_chars_per_doc: 1200
      directed: false
      experiment_id: E007a

scoring:
  method: lexical_baseline
  match_threshold: 0.5

output_dir: ../../results/review2026/pilot_docker_docs/retrieval/after
